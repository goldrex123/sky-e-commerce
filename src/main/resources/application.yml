spring:
  profiles:
    active: local
  datasource:
    username: ecommerce
    url: jdbc:mysql://localhost:3306/ecommerce?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    password: ecommerce123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Redis 설정
  data:
    redis:
      host: localhost
      port: 6379
      password:

# 프론트엔드 URL (OAuth2 콜백 리다이렉트 대상)
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

# JWT 설정 (실제 값은 application-local.yml 또는 환경변수로 관리)
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000     # 30분 (ms)
  refresh-token-expiry: 1209600000 # 14일 (ms)

